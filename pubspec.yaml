name: vitta
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  go_router: ^17.2.0
  get_it: ^9.2.1
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8
  google_fonts: ^6.2.1
  supabase_flutter: ^2.16.0
  http: ^1.6.0
  flutter_dotenv: ^6.0.1
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4
  bloc_presentation: ^1.1.2+3
  loader_overlay: ^5.0.0
  sentry_flutter: ^9.25.0
  image_picker: ^1.2.3
  health: ^13.0.0
  cached_network_image_ce: ^4.9.0
  flutter_local_notifications: ^19.4.2
  timezone: ^0.10.1
  flutter_timezone: ^4.1.1
  url_launcher: ^6.3.1
  purchases_flutter: ^10.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.5
  bloc_presentation_test: ^1.2.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.8
  fake_async: ^1.3.2

dependency_overrides:
  # Both are transitive-only (via health / sentry) — pinned here to dodge broken
  # versions rather than listed as things we depend on directly.
  # device_info_plus 12.4.0 calls [NSProcessInfo isiOSAppOnVision] (iOS 26.1 SDK
  # only), which fails to archive on earlier Xcode. Hold at health's floor..<12.4.0
  # (an unbounded "<12.4.0" lets pub drop to 0.0.1).
  device_info_plus: ">=12.1.0 <12.4.0"

flutter:
  uses-material-design: true
  generate: true
  assets:
    - .env
    - assets/icon/

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#C9EAD9"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"

flutter_native_splash:
  color: "#C9EAD9"
  image: "assets/icon/splash_logo.png"
  color_dark: "#1F5C3F"
  image_dark: "assets/icon/splash_logo.png"
  android_12:
    color: "#C9EAD9"
    image: "assets/icon/splash_logo.png"
    color_dark: "#1F5C3F"
    image_dark: "assets/icon/splash_logo.png"
