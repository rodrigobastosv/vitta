name: TestFlight

# Tag-driven: `git tag v1.2.3 && git push --tags` is the whole release ritual,
# and the tag is what fastlane reads the version from.
on:
  push:
    tags: ['v*']

jobs:
  testflight:
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # ruby-version is required: setup-ruby refuses to guess, and there's no
      # .ruby-version file to read (pinning one would force the same Ruby on
      # everyone locally, which nothing here needs).
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          working-directory: ios
          bundler-cache: true

      # .env is a bundled asset (see pubspec) and gitignored, so a build without
      # this step ships an app that talks to nothing. A missing secret reads as
      # an empty string rather than failing, and Env would only blow up once a
      # tester launches the build - so check here, where it costs nothing.
      - name: Write .env from secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          set -euo pipefail
          for name in SUPABASE_URL SUPABASE_PUBLISHABLE_KEY SENTRY_DSN; do
            if [ -z "${!name}" ]; then
              echo "::error::Secret $name is empty; the build would ship unable to reach its backend."
              exit 1
            fi
          done
          cat > .env <<EOF
          SUPABASE_URL=$SUPABASE_URL
          SUPABASE_PUBLISHABLE_KEY=$SUPABASE_PUBLISHABLE_KEY
          SENTRY_DSN=$SENTRY_DSN
          EOF

      - run: flutter pub get

      # match clones the certificates repo over HTTPS with a Basic auth header.
      # Building it here from a plain token rather than keeping the base64 in a
      # secret: hand-encoding it is a trap - a stray newline (`echo` instead of
      # `printf`, or a careless paste) rides along into the header and GitHub
      # answers a bare 400 that never mentions the credential.
      - name: Build the certificates repo auth header
        env:
          MATCH_GIT_TOKEN: ${{ secrets.MATCH_GIT_TOKEN }}
          # fastlane documents this header as base64("username:token"), so use
          # the real owner rather than the x-access-token convention, which is
          # for GitHub App tokens.
          MATCH_GIT_USER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          # Trimmed because a token pasted with a trailing newline would encode
          # into the credential itself, which fails as a 401 just as opaquely.
          token=$(printf '%s' "$MATCH_GIT_TOKEN" | tr -d '[:space:]')
          if [ -z "$token" ]; then
            echo "::error::Secret MATCH_GIT_TOKEN is empty; match cannot clone the certificates repo."
            exit 1
          fi
          # A base64'd or otherwise mangled token still builds a well-formed
          # header, so git rejects it as a 403 that looks identical to a
          # permissions problem. Name it here instead.
          case "$token" in
            github_pat_* | ghp_* | gho_* | ghs_*) ;;
            *)
              echo "::error::MATCH_GIT_TOKEN is not a GitHub token (expected a github_pat_/ghp_ prefix). Paste the token raw - the workflow does the base64 itself."
              exit 1
              ;;
          esac
          header=$(printf '%s:%s' "$MATCH_GIT_USER" "$token" | base64 | tr -d '\n')
          echo "::add-mask::$header"
          echo "MATCH_GIT_BASIC_AUTHORIZATION=$header" >> "$GITHUB_ENV"

      - name: Build and upload to TestFlight
        working-directory: ios
        run: bundle exec fastlane ios beta
        env:
          VERSION_TAG: ${{ github.ref_name }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_KEY_CONTENT }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          # MATCH_GIT_BASIC_AUTHORIZATION comes from the step above via GITHUB_ENV.
          FASTLANE_SKIP_UPDATE_CHECK: 'true'
          # fastlane warns and can misbehave on a non-UTF-8 locale.
          LANG: en_US.UTF-8
          LC_ALL: en_US.UTF-8
